extends:
  default

role:
  lime:
    font-color: #00bf00
  red:
    font-color: #c5000c
  maroon:
    font-color: #4f2400
  green:
    font-color: #366251
  navy:
    font-color: #4974a5
  get:
    font-color: #FFFFFF
    background-color: #61affe
    font-weight: 700
    border-radius: 1px
  post:
    font-color: #FFFFFF
    background-color: #49cc90
    font-weight: 700
    border-radius: 1px
  put:
    font-color: #FFFFFF
    background-color: #fca130
    font-weight: 700
    border-radius: 1px
  patch:
    font-color: #FFFFFF
    background-color: #50e3c2
    font-weight: 700
    border-radius: 1px
  delete:
    font-color: #FFFFFF
    background-color: #f93e3e
    font-weight: 700
    border-radius: 1px

header:
  height: 0.4in
  line-height: 1
  padding: [ 3, 3, 3, 3 ]
  sectlevels: 0
  image-vertical-align: middle
  columns: "<50% =0% >50%"
  recto: &shared_header
    left:
      content: image:digitech-header-logo.png[]
    right:
      content: '{document-title}'
  verso: *shared_header

footer:
  columns: "<50% =0% >50%"
  recto: &shared_footer
    left:
      content: '{section-or-chapter-title}'
    right:
      content: '{page-number}'
  verso: *shared_footer # avoid duplicated declaration

table:
  caption-max-width: none
  head:
    background-color: #F2C6AB

#image:
#  align: center
